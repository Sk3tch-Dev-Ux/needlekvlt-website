# ═══════════════════════════════════════════════
# NeedleKVLT — Docker Compose
# ═══════════════════════════════════════════════
# Works on Windows (Docker Desktop) and Linux.
#
# Run:  docker compose up -d --build
# Logs: docker compose logs -f app
# Stop: docker compose down

version: '3.8'

services:
  # ── Next.js App ────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_DISCORD_INVITE: ${NEXT_PUBLIC_DISCORD_INVITE}
    container_name: needlekvlt-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    networks:
      - needlekvlt
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx Reverse Proxy ────────────────────
  # Handles SSL termination and proxies to Next.js
  # For Cloudflare SSL: remove 443 listener and ssl lines in nginx.conf
  nginx:
    image: nginx:alpine
    container_name: needlekvlt-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - needlekvlt

networks:
  needlekvlt:
    driver: bridge
